name: limit
description: Apply limiting (hard ceiling) to audio to prevent clipping
inputs:
  input:
    description: Path to input WAV file
    required: true
  output:
    description: Path for output WAV file
    required: true
  threshold:
    description: Limiting threshold in dB
    required: false
    default: "-1"
steps:
  - id: limit
    run: sas-processor limit --input "${{inputs.input}}" --output "${{inputs.output}}" --threshold "${{inputs.threshold}}" --json 2>/dev/null || true
    outputs:
      result: stdout
